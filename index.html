
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pour Mon Unique ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #3a0606 0%, #1a0202 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .sparkle {
            position: absolute;
            top: -10%;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
            filter: drop-shadow(0 0 5px gold);
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 15px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 92%;
            max-width: 380px;
            z-index: 10;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d4af37;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .btn-container { position: relative; height: 250px; width: 100%; }

        button {
            padding: 14px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #yesBtn {
            background: linear-gradient(45deg, #8b0000, #d4af37);
            color: white;
            left: 50%; top: 35%; transform: translate(-50%, -50%);
            z-index: 100;
        }

        #noBtn { background: rgba(255, 255, 255, 0.05); color: #777; left: 50%; top: 75%; transform: translate(-50%, -50%); }

        #final-screen {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center;
            width: 95%; 
            max-width: 450px; 
            z-index: 1000;
        }

        .photo-container {
            position: relative;
            display: inline-block;
            padding: 8px;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            width: auto;
            max-width: 280px; /* Sghert l-container kamel */
            animation: scaleIn 0.8s ease-out;
        }

        .photo-frame {
            width: 100%;
            max-width: 260px; /* Had l-7ajm sghir k-i-khalli l-photo t-ban n9iya */
            display: block;
            object-fit: contain;
            max-height: 40vh; /* Sghert l-toul dialha */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .final-text {
            font-family: 'Dancing Script', cursive;
            color: #d4af37;
            font-size: 2.4rem;
            margin: 5px 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .romantic-msg {
            color: #fceabb;
            font-size: 0.9rem;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            border-top: 2px solid #d4af37;
            font-style: italic;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>Wach Katbghinii? ❤️</h1>
        <div class="btn-container" id="area">
            <button id="yesBtn" onclick="celebrate()">AH</button>
            <button id="noBtn" onclick="moveAndGrow()">LA</button>
        </div>
    </div>

    <div id="final-screen">
        <div class="photo-container">
            <img src="https://i.ibb.co/sdvy03Zj/together.jpg" alt="Together" class="photo-frame">
        </div>
        <div class="final-text">I Love You! ❤️</div>
        <div class="romantic-msg">
            "Ma-ghadich nkhaliw chi khilaf sghir i-nsina f-kolchi zwinn daz binatna. ✨ Sma7i lya 7biba dyali 🥺, Rani kanbghik bazaaaaf a Lowrida dyali 🌹 nti hiya li dima m-nawra liya 7yati ❤️🌙"
        </div>
    </div>

    <script>
        let scale = 1;
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            const icons = ['🌹', '✨', '❤️', '💖'];
            sparkle.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 6000);
        }
        setInterval(createSparkle, 500);

        function moveAndGrow() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const area = document.getElementById('area');
            scale += 0.5;
            yesBtn.style.transform = `translate(-50%, -50%) scale(${scale})`;
            const newX = Math.random() * (area.offsetWidth - 100) + 50;
            const newY = Math.random() * (area.offsetHeight - 100) + 50;
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }

        function celebrate() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff', '#8b0000'] });
            document.getElementById('mainCard').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('mainCard').style.display = 'none';
                document.getElementById('final-screen').style.display = 'block';
            }, 400);
        }
    </script>
</body>
</html>
